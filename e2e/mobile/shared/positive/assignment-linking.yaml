# @scenarios P5
# Assignment linking - link a challenge to a base via the fixed challenge dropdown
appId: ${APP_ID}
---
- launchApp:
    clearState: true

- assertVisible: "PointFinder"
- tapOn: "Operator Login"
- assertVisible: "Operator Login"

- tapOn:
    id: "login-email"
- inputText: "${OPERATOR_EMAIL}"

- tapOn:
    id: "login-password"
- inputText: "${OPERATOR_PASSWORD}"

- hideKeyboard
- tapOn: "Sign In"

- assertVisible:
    id: "create-game-btn"

- tapOn: "${GAME_NAME:-E2E Test Game}"

# Navigate to the base to assign a challenge via the Fixed Challenge dropdown
- tapOn: "${BASE_NAME:-Base Alpha Edited}"

# Select the challenge (platform-specific picker interaction)
- runFlow:
    when:
      platform: "iOS"
    file: ../../ios/assign-challenge.yaml
- runFlow:
    when:
      platform: "Android"
    file: ../../android/assign-challenge.yaml

# Save the base with the new fixed challenge assignment
- tapOn:
    id: "base-save-btn"

# Verify the challenge is now shown under the base
- assertVisible: "${CHALLENGE_TITLE:-Find the Hidden Clue (Updated)}"
