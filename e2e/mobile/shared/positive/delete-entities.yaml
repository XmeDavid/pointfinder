# @scenarios P14
# Delete entities - delete a base and a challenge, verify they disappear from the list
appId: ${APP_ID}
---
- launchApp:
    clearState: true

- assertVisible: "PointFinder"
- tapOn: "Operator Login"
- assertVisible: "Operator Login"

- tapOn:
    id: "login-email"
- inputText: "${OPERATOR_EMAIL}"

- tapOn:
    id: "login-password"
- inputText: "${OPERATOR_PASSWORD}"

- hideKeyboard
- tapOn: "Sign In"

- assertVisible:
    id: "create-game-btn"

- tapOn: "${GAME_NAME:-E2E Test Game}"

# --- Delete a base ---
# Platform-specific sub-flows handle navigation to the delete button (overflow menu on Android, direct on iOS)
- runFlow:
    when:
      platform: "iOS"
    file: ../../ios/delete-base.yaml
- runFlow:
    when:
      platform: "Android"
    file: ../../android/delete-base.yaml

# Confirm deletion dialog — both platforms now use "Delete"
- tapOn: "Delete"

- assertNotVisible: "${UPDATED_BASE_NAME:-Base Alpha v2}"

# --- Delete a challenge ---
# Platform-specific sub-flows handle navigation to the delete button (overflow menu on Android, direct on iOS)
- runFlow:
    when:
      platform: "iOS"
    file: ../../ios/delete-challenge.yaml
- runFlow:
    when:
      platform: "Android"
    file: ../../android/delete-challenge.yaml

# Confirm deletion dialog — both platforms now use "Delete"
- tapOn: "Delete"

- assertNotVisible: "${UPDATED_CHALLENGE_TITLE:-Find the Hidden Clue v2}"
