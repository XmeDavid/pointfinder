# @scenarios P14
# Delete entities - delete a base and a challenge, verify they disappear from the list
appId: ${APP_ID}
---
- launchApp:
    clearState: true

- assertVisible: "PointFinder"
- tapOn: "Operator Login"
- assertVisible: "Operator Login"

- tapOn:
    id: "login-email"
- inputText: "${OPERATOR_EMAIL}"

- tapOn:
    id: "login-password"
- inputText: "${OPERATOR_PASSWORD}"

- hideKeyboard
- tapOn: "Sign In"

- assertVisible:
    id: "create-game-btn"

- tapOn: "${GAME_NAME:-E2E Test Game}"

# --- Delete a base ---
- tapOn: "${UPDATED_BASE_NAME:-Base Alpha v2}"

- tapOn:
    id: "base-delete-btn"

# Confirm deletion dialog
- tapOn: "Delete"

- assertNotVisible: "${UPDATED_BASE_NAME:-Base Alpha v2}"

# --- Delete a challenge ---
- tapOn: "${UPDATED_CHALLENGE_TITLE:-Find the Hidden Clue v2}"

- tapOn:
    id: "challenge-delete-btn"

- tapOn: "Delete"

- assertNotVisible: "${UPDATED_CHALLENGE_TITLE:-Find the Hidden Clue v2}"
