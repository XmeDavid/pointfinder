# @scenarios P6
# Team creation - create a team and verify the join code is displayed
appId: ${APP_ID}
---
- launchApp:
    clearState: true

- assertVisible: "PointFinder"
- tapOn: "Operator Login"
- assertVisible: "Operator Login"

- tapOn:
    id: "login-email"
- inputText: "${OPERATOR_EMAIL}"

- tapOn:
    id: "login-password"
- inputText: "${OPERATOR_PASSWORD}"

- hideKeyboard
- tapOn: "Sign In"

- assertVisible:
    id: "create-game-btn"

- tapOn: "${GAME_NAME:-E2E Test Game}"

# Navigate to Teams via Setup hub
- tapOn: "Teams"

- tapOn:
    id: "create-team-btn"

- tapOn:
    id: "team-name-input"
- inputText: "${TEAM_NAME:-Team Eagle}"

- tapOn:
    id: "team-save-btn"

- assertVisible: "${TEAM_NAME:-Team Eagle}"

# Navigate into the team detail to verify join code is shown
- tapOn:
    id: "team-edit-btn"

- assertVisible:
    id: "team-join-code"
