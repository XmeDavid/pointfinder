# @scenarios P4, P13
# Challenge creation and edit - create a challenge inside a game, then edit its title
appId: ${APP_ID}
---
- launchApp:
    clearState: true

- assertVisible: "PointFinder"
- tapOn: "Operator Login"
- assertVisible: "Operator Login"

- tapOn:
    id: "login-email"
- inputText: "${OPERATOR_EMAIL}"

- tapOn:
    id: "login-password"
- inputText: "${OPERATOR_PASSWORD}"

- hideKeyboard
- tapOn: "Sign In"

- assertVisible:
    id: "create-game-btn"

- tapOn: "${GAME_NAME:-E2E Test Game}"

- tapOn:
    id: "create-challenge-btn"

- tapOn:
    id: "challenge-title-input"
- inputText: "${CREATED_CHALLENGE_TITLE:-Find the Hidden Clue}"

# Select answer type (platform-specific picker interaction)
- runFlow:
    when:
      platform: "iOS"
    file: ../../ios/select-challenge-type.yaml
- runFlow:
    when:
      platform: "Android"
    file: ../../android/select-challenge-type.yaml

- tapOn:
    id: "challenge-save-btn"

- assertVisible: "${CREATED_CHALLENGE_TITLE:-Find the Hidden Clue}"

# Edit the challenge title
- tapOn:
    id: "challenge-edit-btn"

- tapOn:
    id: "challenge-title-input"
- eraseText
- inputText: "${CHALLENGE_TITLE:-Find the Hidden Clue (Updated)}"

- tapOn:
    id: "challenge-save-btn"

- assertVisible: "${CHALLENGE_TITLE:-Find the Hidden Clue (Updated)}"
