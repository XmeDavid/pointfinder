# @scenarios P10
# Player submission - submit a text answer to a challenge
appId: ${APP_ID}
---
- launchApp:
    clearState: true

# Welcome screen button is "Join a Game" on both iOS and Android
- tapOn: "Join a Game"

# Verify join screen is shown (works on both platforms via the input field)
- assertVisible:
    id: "player-join-code-input"

- tapOn:
    id: "player-join-code-input"
- inputText: "${JOIN_CODE}"

- tapOn:
    id: "player-join-btn"

# App navigates to PlayerNameView — enter display name
- tapOn:
    id: "player-name-field"
- inputText: "Test Player"
- hideKeyboard
# Android button text is "Join a Game", iOS is "Join Game"
- tapOn:
    text: "Join a Game"
    optional: true
- tapOn:
    text: "Join Game"
    optional: true

# Permission disclosure dialog appears on fresh install — dismiss it
- tapOn:
    text: "Continue"
    optional: true

- assertVisible:
    id: "player-base-list"

- tapOn: "${BASE_NAME:-Base Alpha v2}"

- assertVisible:
    id: "player-challenge-list"

- tapOn: "${CHALLENGE_TITLE:-Find the Hidden Clue v2}"

- tapOn:
    id: "player-answer-input"
- inputText: "The answer is 42"

- tapOn:
    id: "player-submit-btn"

# Verify submission was received
- assertVisible:
    id: "player-submission-status"
- assertVisible: "Submitted"
