# @scenarios P2
# Game creation - login as operator, create a new game, verify it appears in list
appId: ${APP_ID}
---
- launchApp:
    clearState: true

- assertVisible: "PointFinder"
- tapOn: "Operator Login"
- assertVisible: "Operator Login"

- tapOn:
    id: "login-email"
- inputText: "${OPERATOR_EMAIL}"

- tapOn:
    id: "login-password"
- inputText: "${OPERATOR_PASSWORD}"

- hideKeyboard
- tapOn: "Sign In"

- assertVisible:
    id: "create-game-btn"

- tapOn:
    id: "create-game-btn"

- tapOn:
    id: "game-name-input"
- inputText: "${GAME_NAME:-E2E Test Game}"

- tapOn:
    id: "game-save-btn"

- assertVisible: "${GAME_NAME:-E2E Test Game}"
