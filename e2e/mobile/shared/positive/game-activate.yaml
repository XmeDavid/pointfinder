# @scenarios P8
# Game activation - activate a game and verify its status changes
appId: ${APP_ID}
---
- launchApp:
    clearState: true

- assertVisible: "PointFinder"
- tapOn: "Operator Login"
- assertVisible: "Operator Login"

- tapOn:
    id: "login-email"
- inputText: "${OPERATOR_EMAIL}"

- tapOn:
    id: "login-password"
- inputText: "${OPERATOR_PASSWORD}"

- hideKeyboard
- tapOn: "Sign In"

- assertVisible:
    id: "create-game-btn"

- tapOn: "${GAME_NAME:-E2E Test Game}"

- tapOn:
    id: "game-activate-btn"

# Confirm activation dialog — button text is "Go Live"
- tapOn: "Go Live"

# Verify the game status has changed to live
- assertVisible:
    id: "game-status-label"
- assertVisible: "Live"
