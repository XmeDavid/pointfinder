# @scenarios P11, P12
# Submission review - operator reviews a player submission and approves or rejects it
appId: ${APP_ID}
---
- launchApp:
    clearState: true

- assertVisible: "PointFinder"
- tapOn: "Operator Login"
- assertVisible: "Operator Login"

- tapOn:
    id: "login-email"
- inputText: "${OPERATOR_EMAIL}"

- tapOn:
    id: "login-password"
- inputText: "${OPERATOR_PASSWORD}"

- hideKeyboard
- tapOn: "Sign In"

- assertVisible:
    id: "create-game-btn"

- tapOn: "${GAME_NAME:-E2E Test Game}"

# Tap the "Submissions" tab (tab 2 in OperatorGameView)
- tapOn: "Submissions"

# Wait for submissions to load, then tap into the pending submission
- tapOn: "The answer is 42"

# P11: Approve the submission
- tapOn:
    id: "submission-approve-btn"

# After approving, the review sheet dismisses — verify we're back on the submissions list
- assertVisible: "Submissions"

# Re-enter submissions tab to verify (P12)
- tapOn: "Submissions"
