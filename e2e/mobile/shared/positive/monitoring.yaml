# @scenarios P17
# Monitoring - view the operator dashboard and leaderboard during an active game
appId: ${APP_ID}
---
- launchApp:
    clearState: true

- assertVisible: "PointFinder"
- tapOn: "Operator Login"
- assertVisible: "Operator Login"

- tapOn:
    id: "login-email"
- inputText: "${OPERATOR_EMAIL}"

- tapOn:
    id: "login-password"
- inputText: "${OPERATOR_PASSWORD}"

- hideKeyboard
- tapOn: "Sign In"

- assertVisible:
    id: "create-game-btn"

- tapOn: "${GAME_NAME:-E2E Test Game}"

# Tap the "Live" tab (tab 1 in OperatorGameView)
- tapOn: "Live"

# Verify the monitoring/dashboard view is visible
- assertVisible:
    id: "monitoring-tab"

# Verify leaderboard section is present (default segment)
- assertVisible:
    id: "leaderboard-view"

# Switch to Activity segment to see submission feed
- tapOn: "Activity"

# Verify submission activity feed is present
- assertVisible:
    id: "submission-list"
