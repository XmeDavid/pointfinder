# @scenarios P7
# Player join - launch app as player, enter join code, verify team assignment
appId: ${APP_ID}
---
- launchApp:
    clearState: true

- assertVisible: "PointFinder"
- tapOn: "Join a Game"

- tapOn:
    id: "player-join-code-input"
- inputText: "${JOIN_CODE}"

- tapOn:
    id: "player-join-btn"

# App navigates to PlayerNameView — enter display name
- tapOn:
    id: "player-name-field"
- inputText: "Test Player"
- hideKeyboard
- tapOn: "Join Game"

# Verify player is now in the game and sees their team assignment
- assertVisible: "${JOIN_TEAM_NAME:-Team Eagle}"
- assertVisible:
    id: "player-base-list"
