# @scenarios P18
# Operator notification - send a broadcast notification to all teams in the game
appId: ${APP_ID}
---
- launchApp:
    clearState: true

- assertVisible: "PointFinder"
- tapOn: "Operator Login"
- assertVisible: "Operator Login"

- tapOn:
    id: "login-email"
- inputText: "${OPERATOR_EMAIL}"

- tapOn:
    id: "login-password"
- inputText: "${OPERATOR_PASSWORD}"

- hideKeyboard
- tapOn: "Sign In"

- assertVisible:
    id: "create-game-btn"

- tapOn: "${GAME_NAME:-E2E Test Game}"

# Tap the "More" tab (tab 3 in OperatorGameView) to access notifications
- tapOn: "More"

# Navigate to Notifications management
- tapOn: "Notifications"

- tapOn:
    id: "notification-message-input"
- inputText: "Attention teams: bonus challenge available at Base Alpha!"

- tapOn:
    id: "notification-send-btn"

# After sending, the message field is cleared — verify by asserting the sent message appears in history
- assertVisible: "Attention teams: bonus challenge available at Base Alpha!"
