# @scenarios P13
# Edit entities - edit base, challenge, and team names to verify all edit flows work
appId: ${APP_ID}
---
- launchApp:
    clearState: true

- assertVisible: "PointFinder"
- tapOn: "Operator Login"
- assertVisible: "Operator Login"

- tapOn:
    id: "login-email"
- inputText: "${OPERATOR_EMAIL}"

- tapOn:
    id: "login-password"
- inputText: "${OPERATOR_PASSWORD}"

- hideKeyboard
- tapOn: "Sign In"

- assertVisible:
    id: "create-game-btn"

- tapOn: "${GAME_NAME:-E2E Test Game}"

# --- Edit a base ---
# On iOS, tapping the list item navigates directly into BaseEditView
# On Android, an additional tap on the edit button is needed
- tapOn: "${BASE_NAME:-Base Alpha Edited}"

- runFlow:
    when:
      platform: "Android"
    file: ../../android/tap-base-edit-btn.yaml

- tapOn:
    id: "base-name-input"
- eraseText
- inputText: "${UPDATED_BASE_NAME:-Base Alpha v2}"

- tapOn:
    id: "base-save-btn"

- assertVisible: "${UPDATED_BASE_NAME:-Base Alpha v2}"

# --- Edit a challenge ---
- tapOn: "${CHALLENGE_TITLE:-Find the Hidden Clue (Updated)}"

- runFlow:
    when:
      platform: "Android"
    file: ../../android/tap-challenge-edit-btn.yaml

- tapOn:
    id: "challenge-title-input"
- eraseText
- inputText: "${UPDATED_CHALLENGE_TITLE:-Find the Hidden Clue v2}"

- tapOn:
    id: "challenge-save-btn"

- assertVisible: "${UPDATED_CHALLENGE_TITLE:-Find the Hidden Clue v2}"

# --- Edit a team ---
# Navigate back to Setup hub, then into Teams
- back
- tapOn: "Teams"

- tapOn: "${TEAM_NAME:-Team Eagle}"

- runFlow:
    when:
      platform: "Android"
    file: ../../android/tap-team-edit-btn.yaml

- tapOn:
    id: "team-name-input"
- eraseText
- inputText: "${UPDATED_TEAM_NAME:-Team Eagle Edited}"

- tapOn:
    id: "team-save-btn"

- assertVisible: "${UPDATED_TEAM_NAME:-Team Eagle Edited}"
