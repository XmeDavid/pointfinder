# @scenarios P13
# Edit entities - edit base, challenge, and team names to verify all edit flows work
appId: ${APP_ID}
---
- launchApp:
    clearState: true

- tapOn:
    id: "login-email"
- inputText: "${OPERATOR_EMAIL}"

- tapOn:
    id: "login-password"
- inputText: "${OPERATOR_PASSWORD}"

- tapOn:
    id: "login-submit"

- assertVisible: "Games"

- tapOn: "${GAME_NAME:-E2E Test Game}"

# --- Edit a base ---
- tapOn: "${BASE_NAME:-Base Alpha Edited}"

- tapOn:
    id: "base-edit-btn"

- clearText:
    id: "base-name-input"
- tapOn:
    id: "base-name-input"
- inputText: "Base Alpha v2"

- tapOn:
    id: "base-save-btn"

- assertVisible: "Base Alpha v2"

# --- Edit a challenge ---
- tapOn: "${CHALLENGE_TITLE:-Find the Hidden Clue (Updated)}"

- tapOn:
    id: "challenge-edit-btn"

- clearText:
    id: "challenge-title-input"
- tapOn:
    id: "challenge-title-input"
- inputText: "Find the Hidden Clue v2"

- tapOn:
    id: "challenge-save-btn"

- assertVisible: "Find the Hidden Clue v2"

# --- Edit a team ---
- tapOn:
    id: "nav-teams"

- tapOn: "Team Eagle"

- tapOn:
    id: "team-edit-btn"

- clearText:
    id: "team-name-input"
- tapOn:
    id: "team-name-input"
- inputText: "Team Eagle Edited"

- tapOn:
    id: "team-save-btn"

- assertVisible: "Team Eagle Edited"
