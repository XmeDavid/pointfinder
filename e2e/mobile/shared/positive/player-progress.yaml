# @scenarios P9
# Player progress - view bases and challenges list during an active game
appId: ${APP_ID}
---
- launchApp:
    clearState: true

- assertVisible: "PointFinder"
- tapOn: "Join a Game"

- tapOn:
    id: "player-join-code-input"
- inputText: "${JOIN_CODE}"

- tapOn:
    id: "player-join-btn"

# App navigates to PlayerNameView — enter display name
- tapOn:
    id: "player-name-field"
- inputText: "Test Player"
- hideKeyboard
# Android button text is "Join a Game", iOS is "Join Game"
- tapOn:
    text: "Join a Game"
    optional: true
- tapOn:
    text: "Join Game"
    optional: true

# Permission disclosure dialog appears on fresh install — dismiss it
- tapOn:
    text: "Continue"
    optional: true

# Verify the base list is visible
- assertVisible:
    id: "player-base-list"

# Tap into a base to see its challenges
- tapOn: "${BASE_NAME:-Base Alpha v2}"

- assertVisible:
    id: "player-challenge-list"

# Verify at least one challenge is listed
- assertVisible: "${CHALLENGE_TITLE:-Find the Hidden Clue v2}"
