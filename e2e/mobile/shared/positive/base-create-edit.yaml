# @scenarios P3, P13
# Base creation and edit - navigate to game, create base with coordinates, then edit its name
appId: ${APP_ID}
---
- launchApp:
    clearState: true

- assertVisible: "PointFinder"
- tapOn: "Operator Login"
- assertVisible: "Operator Login"

- tapOn:
    id: "login-email"
- inputText: "${OPERATOR_EMAIL}"

- tapOn:
    id: "login-password"
- inputText: "${OPERATOR_PASSWORD}"

- hideKeyboard
- tapOn: "Sign In"

- assertVisible:
    id: "create-game-btn"

# Open the target game
- tapOn: "${GAME_NAME:-E2E Test Game}"

# Create a new base
- tapOn:
    id: "create-base-btn"

- tapOn:
    id: "base-name-input"
- inputText: "${CREATED_BASE_NAME:-Base Alpha}"

# NOTE: base-lat-input and base-lng-input do not exist in either app.
# Both Android and iOS use an embedded map where the operator taps to place a pin.
# Coordinate input via text field is not supported; these steps are skipped.
# A real E2E run would need to tap on the map view at a specific coordinate.

- tapOn:
    id: "base-save-btn"

- assertVisible: "${CREATED_BASE_NAME:-Base Alpha}"

# Edit the base name
# iOS: after creation, the app auto-navigates into the edit view — go back to list first
- runFlow:
    when:
      platform: "iOS"
    file: ../../ios/navigate-to-base-edit.yaml
    env:
      BASE_ITEM_NAME: "${CREATED_BASE_NAME:-Base Alpha}"
# Android: tap the edit button from the list
- runFlow:
    when:
      platform: "Android"
    file: ../../android/navigate-to-base-edit.yaml

- tapOn:
    id: "base-name-input"
- eraseText
- inputText: "${BASE_NAME:-Base Alpha Edited}"

- tapOn:
    id: "base-save-btn"

- assertVisible: "${BASE_NAME:-Base Alpha Edited}"
