# @scenarios P16
# Export/import - verify export option is accessible from the game detail screen
appId: ${APP_ID}
---
- launchApp:
    clearState: true

- assertVisible: "PointFinder"
- tapOn: "Operator Login"
- assertVisible: "Operator Login"

- tapOn:
    id: "login-email"
- inputText: "${OPERATOR_EMAIL}"

- tapOn:
    id: "login-password"
- inputText: "${OPERATOR_PASSWORD}"

- hideKeyboard
- tapOn: "Sign In"

- assertVisible:
    id: "create-game-btn"

- tapOn: "${GAME_NAME:-E2E Test Game}"

# Navigate to the More tab where export lives
- tapOn: "More"

# Verify export button is present
- assertVisible:
    id: "game-export-btn"

- tapOn:
    id: "game-export-btn"

# iOS: UIActivityViewController (share sheet) shows a Cancel button
# Android: triggers a share intent chooser — no universal Cancel text
- assertVisible:
    text: "Cancel"
    optional: true
