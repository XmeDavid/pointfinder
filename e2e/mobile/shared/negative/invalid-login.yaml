# @scenarios N1
# Invalid login - wrong password should show an error, not navigate to games
appId: ${APP_ID}
---
- launchApp:
    clearState: true

- assertVisible: "PointFinder"
- tapOn: "Operator Login"
- assertVisible: "Operator Login"

- tapOn:
    id: "login-email"
- inputText: "${OPERATOR_EMAIL}"

- tapOn:
    id: "login-password"
- inputText: "wrong-password-12345"

- hideKeyboard
- tapOn: "Sign In"

# Android: inline error text with testTag "login-error"
# iOS: alert dialog with "OK" button
- assertVisible:
    id: "login-error"
    optional: true
- assertVisible:
    text: "OK"
    optional: true

# Dismiss iOS alert if present
- tapOn:
    text: "OK"
    optional: true

# Verify we did NOT navigate to the games screen
- assertNotVisible: "My Games"
