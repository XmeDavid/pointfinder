server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    location ^~ /api/ {
        proxy_pass http://pointfinder-backend-v4djml:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ~ ^/(ws-native|ws)(/|$) {
        proxy_pass http://pointfinder-backend-v4djml:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location = /.well-known/apple-app-site-association {
        default_type application/json;
        return 200 '{"webcredentials":{"apps":["ZQ6CKMW9NA.com.prayer.pointfinder"]},"applinks":{"apps":[],"details":[{"appID":"ZQ6CKMW9NA.com.prayer.pointfinder","paths":["/tag/*","/dashboard"]}]}}';
    }

    location = /.well-known/assetlinks.json {
        default_type application/json;
        return 200 '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"com.prayer.pointfinder","sha256_cert_fingerprints":["FF:8A:55:44:74:FD:9A:D8:94:33:89:2D:83:0B:85:60:9B:10:02:65:92:AA:BE:B5:B9:81:44:06:D7:B0:80:19"]}}]';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
