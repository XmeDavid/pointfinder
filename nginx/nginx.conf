events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    upstream backend {
        server backend:8080;
    }

    upstream grafana {
        server grafana:3000;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=player_join_limit:10m rate=5r/m;

    # HTTP server - redirect to HTTPS (except for ACME challenges)
    server {
        listen 80 default_server;
        server_name _;
        return 410;
    }

    server {
        listen 80;
        server_name pointfinder.pt pointfinder.ch grafana.pointfinder.pt grafana.pointfinder.ch;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2 default_server;
        server_name _;
        ssl_certificate /etc/letsencrypt/live/pointfinder.pt/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pointfinder.pt/privkey.pem;
        return 421;
    }

    server {
        listen 443 ssl http2;
        server_name pointfinder.pt pointfinder.ch;
        client_max_body_size 100m;

        # SSL certificate paths
        ssl_certificate /etc/letsencrypt/live/pointfinder.pt/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pointfinder.pt/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com https://*.geo.admin.ch https://tiles.openfreemap.org; font-src 'self'; connect-src 'self' wss://*.pointfinder.pt wss://*.pointfinder.ch https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com https://*.geo.admin.ch https://tiles.openfreemap.org; worker-src 'self' blob:; frame-ancestors 'self'" always;

        # API endpoints
        location ^~ /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS is handled by the Spring backend (CorsConfig) -- do not duplicate here.
        }

        # Player join endpoint with aggressive rate limiting (brute-force protection)
        location ^~ /api/auth/player/join {
            limit_req zone=player_join_limit burst=2 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auth endpoints with stricter rate limiting
        location ^~ /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket endpoints
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket timeout settings
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Uploaded files are now served through authenticated backend endpoints:
        # /api/player/files/{gameId}/{filename} (player auth)
        # /api/games/{gameId}/files/{filename}  (operator/admin auth)
        # The /uploads/ static block has been removed for security.

        # Apple App Site Association (password autofill & universal links)
        location /.well-known/apple-app-site-association {
            default_type application/json;
            return 200 '{"webcredentials":{"apps":["ZQ6CKMW9NA.com.prayer.pointfinder"]},"applinks":{"apps":[],"details":[{"appID":"ZQ6CKMW9NA.com.prayer.pointfinder","paths":["/tag/*"]}]}}';
        }

        # Android App Links verification
        location /.well-known/assetlinks.json {
            default_type application/json;
            return 200 '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"com.prayer.pointfinder","sha256_cert_fingerprints":["FF:8A:55:44:74:FD:9A:D8:94:33:89:2D:83:0B:85:60:9B:10:02:65:92:AA:BE:B5:B9:81:44:06:D7:B0:80:19"]}}]';
        }

        # NFC tag landing page (fallback for devices without the app)
        location /tag/ {
            root /usr/share/nginx/html/app;
            try_files /tag/index.html =404;
        }

        # Health check
        location /health {
            proxy_pass http://backend;
            access_log off;
        }

        # Actuator endpoints - block external access, only allow from internal/loopback
        location /actuator/ {
            deny all;
            return 404;
        }

        # Frontend (static files from Vite build)
        location / {
            root /usr/share/nginx/html/app;
            index index.html;
            try_files $uri $uri/ /__spa.html;
        }

        # Cache static assets with content hashes aggressively
        # NOTE: add_header in a location block clears parent-level headers,
        # so security headers must be repeated here.
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            root /usr/share/nginx/html/app;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com https://*.geo.admin.ch https://tiles.openfreemap.org; font-src 'self'; connect-src 'self' wss://*.pointfinder.pt wss://*.pointfinder.ch https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com https://*.geo.admin.ch https://tiles.openfreemap.org; worker-src 'self' blob:; frame-ancestors 'self'" always;
        }
    }

    # Grafana subdomain
    server {
        listen 443 ssl http2;
        server_name grafana.pointfinder.pt grafana.pointfinder.ch;

        ssl_certificate /etc/letsencrypt/live/pointfinder.pt/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pointfinder.pt/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass http://grafana;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (Grafana live features)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
