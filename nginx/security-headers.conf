# Shared security headers
# Included in locations serving user-facing content

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-hashes' 'sha256-1jAmyYXcRq6zFldLe/GCgIDJBiOONdXjTLgEFMDnDSM='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://tile.openstreetmap.org https://*.tile.openstreetmap.org https://basemaps.cartocdn.com https://*.basemaps.cartocdn.com https://geo.admin.ch https://*.geo.admin.ch https://tiles.openfreemap.org; font-src 'self'; connect-src 'self' wss://*.pointfinder.pt wss://*.pointfinder.ch https://tile.openstreetmap.org https://*.tile.openstreetmap.org https://basemaps.cartocdn.com https://*.basemaps.cartocdn.com https://geo.admin.ch https://*.geo.admin.ch https://tiles.openfreemap.org; worker-src 'self' blob:; frame-ancestors 'self'" always;
