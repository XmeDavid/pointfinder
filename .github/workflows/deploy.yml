name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pointfinder-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DEPLOY_PATH: /opt/pointfinder

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image owner
        id: image-owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          cache-from: type=gha,scope=pointfinder-backend
          cache-to: type=gha,mode=max,scope=pointfinder-backend
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-owner.outputs.owner }}/pointfinder-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.image-owner.outputs.owner }}/pointfinder-backend:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web-admin
          push: true
          cache-from: type=gha,scope=pointfinder-web
          cache-to: type=gha,mode=max,scope=pointfinder-web
          build-args: |
            VITE_API_URL=/api
            VITE_WS_URL=/ws-native
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-owner.outputs.owner }}/pointfinder-web:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.image-owner.outputs.owner }}/pointfinder-web:latest

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: true
          cache-from: type=gha,scope=pointfinder-nginx
          cache-to: type=gha,mode=max,scope=pointfinder-nginx
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-owner.outputs.owner }}/pointfinder-nginx:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.image-owner.outputs.owner }}/pointfinder-nginx:latest

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p ${{ env.DEPLOY_PATH }}/deploy
            mkdir -p ${{ env.DEPLOY_PATH }}/certbot/conf
            mkdir -p ${{ env.DEPLOY_PATH }}/certbot/www
            mkdir -p ${{ env.DEPLOY_PATH }}/secrets

      - name: Upload deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: deploy/docker-compose.yml
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true

      - name: Upload monitoring config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: prometheus,grafana
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true

      - name: Restart production stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -eu
            cd ${{ env.DEPLOY_PATH }}
            test -f .env
            export GHCR_OWNER=${{ steps.image-owner.outputs.owner }}
            export IMAGE_TAG=${{ github.sha }}
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose --project-directory . --env-file .env -f deploy/docker-compose.yml pull
            docker compose --project-directory . --env-file .env -f deploy/docker-compose.yml up -d --remove-orphans
            docker image prune -f
