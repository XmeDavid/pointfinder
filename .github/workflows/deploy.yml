name: Deploy

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: pointfinder-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Trigger Dokploy (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: pointfinder-backend
            touched_path: backend/
          - service: pointfinder-frontend
            touched_path: web-admin/

    steps:
      - name: Verify manual deploy branch
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "Manual production deploys must run from main, got '${GITHUB_REF}'."
          exit 1

      - name: Trigger deployment
        env:
          DOKPLOY_RELAY_TOKEN: ${{ secrets.DOKPLOY_RELAY_TOKEN }}
          DOKPLOY_RELAY_URL: https://actions.davidsbatista.com/deploy/${{ matrix.service }}
          DOKPLOY_TOUCHED_PATH: ${{ matrix.touched_path }}
        run: |
          set -euo pipefail

          if [ -z "${DOKPLOY_RELAY_TOKEN}" ]; then
            echo "Missing required secret: DOKPLOY_RELAY_TOKEN"
            exit 1
          fi

          response_file="$(mktemp)"
          http_code="$(
            curl --show-error --silent \
              --output "$response_file" \
              --write-out "%{http_code}" \
              --request POST "$DOKPLOY_RELAY_URL" \
              --header "X-Deploy-Token: $DOKPLOY_RELAY_TOKEN" \
              --header "X-GitHub-Event: push" \
              --header "X-GitHub-Delivery: $GITHUB_RUN_ID" \
              --header "Content-Type: application/json" \
              --data @- <<JSON
          {
            "ref": "${GITHUB_REF}",
            "after": "${GITHUB_SHA}",
            "head_commit": {
              "id": "${GITHUB_SHA}",
              "message": "GitHub Actions deploy ${GITHUB_SHA}"
            },
            "commits": [
              {
                "id": "${GITHUB_SHA}",
                "message": "GitHub Actions deploy ${GITHUB_SHA}",
                "modified": ["${DOKPLOY_TOUCHED_PATH}"]
              }
            ],
            "repository": {
              "name": "${GITHUB_REPOSITORY#*/}",
              "full_name": "${GITHUB_REPOSITORY}"
            }
          }
          JSON
          )"

          cat "$response_file"
          echo

          case "$http_code" in
            2*) ;;
            *)
              echo "Dokploy relay returned HTTP $http_code"
              exit 1
              ;;
          esac
