name: Deploy

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: pointfinder-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  DOKPLOY_RELAY_URL: https://actions.davidsbatista.com/deploy/pointfinder-backend

jobs:
  deploy:
    name: Trigger Dokploy
    runs-on: ubuntu-latest

    steps:
      - name: Verify manual deploy branch
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "Manual production deploys must run from main, got '${GITHUB_REF}'."
          exit 1

      - name: Trigger backend deployment
        env:
          DOKPLOY_RELAY_TOKEN: ${{ secrets.DOKPLOY_RELAY_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${DOKPLOY_RELAY_TOKEN}" ]; then
            echo "Missing required secret: DOKPLOY_RELAY_TOKEN"
            exit 1
          fi

          curl --fail-with-body --show-error --silent \
            --request POST "$DOKPLOY_RELAY_URL" \
            --header "X-Deploy-Token: $DOKPLOY_RELAY_TOKEN" \
            --header "Content-Type: application/json" \
            --data @- <<JSON
          {
            "repository": "${GITHUB_REPOSITORY}",
            "ref": "${GITHUB_REF}",
            "sha": "${GITHUB_SHA}",
            "workflow": "${GITHUB_WORKFLOW}",
            "run_id": "${GITHUB_RUN_ID}",
            "actor": "${GITHUB_ACTOR}"
          }
          JSON
