<!doctype html>
<html lang="en">
<body style="margin: 0; padding: 24px; background-color: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #171717;">
    <div style="max-width: 620px; margin: 0 auto; background-color: #ffffff; border: 1px solid #e5e5e5; border-radius: 12px; overflow: hidden;">
        <div style="padding: 24px; border-bottom: 1px solid #e5e5e5; background-color: #fafafa;">
            <p style="margin: 0; font-size: 13px; letter-spacing: 0.4px; text-transform: uppercase; color: #737373;">{{LABEL}}</p>
            <p style="margin: 8px 0 0; font-size: 24px; font-weight: 700; color: #16a34a;">PointFinder</p>
        </div>
        <div style="padding: 24px;">
            <h2 style="margin: 0 0 14px; font-size: 24px; line-height: 1.35; color: #171717;">{{TITLE}}</h2>
            {{CONTENT_HTML}}
            <div style="margin: 28px 0; text-align: center;">
                <a href="{{ACTION_URL}}"
                   style="display: inline-block; background-color: #16a34a; color: #ffffff; text-decoration: none; border-radius: 8px; padding: 12px 24px; font-size: 15px; font-weight: 600;">
                    {{CTA_LABEL}}
                </a>
            </div>
            <p style="margin: 0; color: #737373; font-size: 13px; line-height: 1.6;">
                If the button does not work, copy and paste this link into your browser:<br/>
                <a href="{{ACTION_URL}}" style="color: #16a34a; word-break: break-all;">{{ACTION_URL}}</a>
            </p>
        </div>
        <div style="padding: 16px 24px; border-top: 1px solid #e5e5e5; background-color: #fafafa;">
            <p style="margin: 0; color: #737373; font-size: 12px; line-height: 1.5;">
                This email was sent by PointFinder. If you were not expecting this invitation, you can safely ignore it.
            </p>
        </div>
    </div>
</body>
</html>
